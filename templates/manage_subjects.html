<!DOCTYPE html>
<html>
<head>
<title>Manage Subjects</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:15px;
max-width:800px;
margin:auto;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#667eea;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.btn{
padding:6px 12px;
border-radius:6px;
text-decoration:none;
color:white;
}

.edit{
background:#28a745;
}

.delete{
background:#dc3545;
}

</style>
</head>

<body>

<div class="container">

<h2>Manage Subjects</h2>

<table>

<tr>
<th>ID</th>
<th>Subject</th>
<th>Action</th>
</tr>

{% for s in subjects %}

<tr>

<td>{{s.id}}</td>
<td>{{s.name}}</td>

<td>

<a class="btn edit" href="/edit_subject/{{s.id}}">Edit</a>

<a class="btn delete"
href="/delete_subject/{{s.id}}"
onclick="return confirm('Delete subject?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
