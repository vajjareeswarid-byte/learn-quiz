<!DOCTYPE html>
<html>
<head>
<title>Online Quiz System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    background:white;
    padding:50px;
    border-radius:18px;
    text-align:center;
    width:400px;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

h1{
    margin-bottom:10px;
    color:#333;
}

p{
    color:#666;
    margin-bottom:30px;
}

.btn{
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    text-decoration:none;
    background:#667eea;
    color:white;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#5a67d8;
}

</style>
</head>

<body>

<div class="container">

<h1>Online Quiz System</h1>

<p>Test your knowledge and improve your skills</p>

<a href="/login" class="btn">Login</a>

<a href="/register" class="btn">Register</a>

</div>

</body>
</html>

</html>
