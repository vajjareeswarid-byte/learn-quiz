<!DOCTYPE html>
<html>
<head>
<title>Add Subject</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:25px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:15px;
    font-size:14px;
}

input:focus{
    border-color:#667eea;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
}

.back{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#667eea;
    font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h2>Add Subject</h2>

<form action="/add_subject" method="POST">

<input type="text" name="name" placeholder="Enter Subject Name" required>

<button type="submit">Add Subject</button>

</form>

<a href="/admin" class="back">← Back to Admin</a>

</div>

</body>
</html>
