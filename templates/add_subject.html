<!DOCTYPE html>
<html>
<head>
<title>Add Subject</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a0dad,#8e44ad);
    font-family:'Segoe UI',Arial;
}

.box{
    background:white;
    padding:40px;
    border-radius:18px;
    width:380px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

h2{
    margin-bottom:25px;
    color:#6a0dad;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:#6a0dad;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.back{
    display:block;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="box">
<h2>Add New Subject</h2>

<form method="POST">

<input type="text" name="name"
placeholder="Enter Subject Name" required>

<button type="submit">Add Subject</button>

</form>

<a href="/admin" class="back">← Back to Admin Panel</a>

</div>

</body>
</html>
