<!DOCTYPE html>
<html>
<head>
    <title>View Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Quiz Results</span>
    <a href="/admin_panel" class="btn btn-outline-light btn-sm">Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow-sm p-4">
        <h3 class="mb-4 text-center">Student Results</h3>

        <table class="table table-striped table-hover align-middle text-center">
            <thead class="table-dark">
                <tr>
                    <th>Student</th>
                    <th>Subject</th>
                    <th>Unit</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody>
                {% for r in results %}
                <tr>
                    <td>{{ r.name }}</td>
                    <td>{{ r.subject_name }}</td>
                    <td>{{ r.unit_name }}</td>
                    <td>
                        <span class="badge bg-success">
                            {{ r.score }}/{{ r.total }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
