<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#6a11cb,#8e44ad);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:#f1f1f1;
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h2{
color:#6a11cb;
margin-bottom:25px;
}

.btn{
display:block;
width:100%;
padding:14px;
margin:10px 0;
background:#6a11cb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#4b0082;
}

.logout{
background:#e74c3c;
}

.logout:hover{
background:#c0392b;
}

.footer{
margin-top:20px;
font-size:13px;
color:#666;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Dashboard</h2>

<a href="/add_subject">
<button class="btn">➕ Add Subject</button>
</a>

<a href="/manage_subjects">
<button class="btn">📚 Manage Subjects</button>
</a>

<a href="/add_unit">
<button class="btn">📖 Add Unit</button>
</a>

<a href="/add_material">
<button class="btn">📂 Add Study Material</button>
</a>

<a href="/add_quiz">
<button class="btn">📝 Add Quiz</button>
</a>

<a href="/view">
<button class="btn">📊 View Data</button>
</a>

<a href="/view_results">
<button class="btn">📈 View Results</button>
</a>

<a href="/logout">
<button class="btn logout">🚪 Logout</button>
</a>

<div class="footer">
Online Quiz & Study Material Management System
</div>

</div>

</body>
</html>
