<!DOCTYPE html>
<html>
<head>
<title>Manage Units</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:15px;
max-width:900px;
margin:auto;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#ff7e5f;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.btn{
padding:6px 12px;
border-radius:6px;
text-decoration:none;
color:white;
}

.edit{
background:#28a745;
}

.delete{
background:#dc3545;
}

</style>
</head>

<body>

<div class="container">

<h2>Manage Units</h2>

<table>

<tr>
<th>ID</th>
<th>Unit</th>
<th>Subject</th>
<th>Action</th>
</tr>

{% for u in units %}

<tr>

<td>{{u.id}}</td>
<td>{{u.name}}</td>
<td>{{u.subject}}</td>

<td>

<a class="btn edit" href="/edit_unit/{{u.id}}">Edit</a>

<a class="btn delete"
href="/delete_unit/{{u.id}}"
onclick="return confirm('Delete unit?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
