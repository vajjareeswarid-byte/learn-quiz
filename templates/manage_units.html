<!DOCTYPE html>
<html>
<head>
    <title>Manage Units</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Manage Units</h2>
        <a href="/add_unit" class="btn btn-primary">+ Add Unit</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Unit Name</th>
                        <th>Subject</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for unit in units %}
                    <tr>
                        <td>{{ unit.id }}</td>
                        <td>{{ unit.name }}</td>
                        <td>{{ unit.subject_name }}</td>
                        <td>
                            <a href="/edit_unit/{{ unit.id }}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="/delete_unit/{{ unit.id }}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure?')">
                               Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
