<!DOCTYPE html>
<html>
<head>
<title>Manage Units</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff7e5f,#feb47b);
    min-height:100vh;
    padding:40px;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    max-width:900px;
    margin:auto;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#ff7e5f;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f2f2f2;
}

.btn{
    padding:6px 12px;
    text-decoration:none;
    border-radius:6px;
    color:white;
    font-size:13px;
}

.edit{
    background:#28a745;
}

.delete{
    background:#dc3545;
}

.back{
    display:block;
    margin-top:20px;
    text-align:center;
    text-decoration:none;
    color:#ff7e5f;
}

</style>
</head>

<body>

<div class="container">

<h2>Manage Units</h2>

<table>

<tr>
<th>ID</th>
<th>Unit</th>
<th>Subject</th>
<th>Action</th>
</tr>

{% for u in units %}

<tr>
<td>{{u.id}}</td>
<td>{{u.name}}</td>
<td>{{u.subject}}</td>

<td>

<a class="btn edit" href="/edit_unit/{{u.id}}">Edit</a>

<a class="btn delete"
href="/delete_unit/{{u.id}}"
onclick="return confirm('Delete this unit?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

<a href="/admin" class="back">← Back to Admin</a>

</div>

</body>
</html>
