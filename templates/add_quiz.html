<!DOCTYPE html>
<html>
<head>
    <title>Add Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Quiz Admin Panel</span>
    <a href="/admin_panel" class="btn btn-outline-light btn-sm">Back</a>
</nav>

<div class="container mt-5">
    <div class="card shadow-lg col-md-8 mx-auto p-4">
        <h3 class="text-center mb-4">Add New Question</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Select Unit</label>
                <select name="unit_id" class="form-select">
                    {% for unit in units %}
                    <option value="{{ unit.id }}">{{ unit.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Question</label>
                <textarea name="question" class="form-control" rows="3" required></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" name="o1" class="form-control" placeholder="Option 1" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" name="o2" class="form-control" placeholder="Option 2" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" name="o3" class="form-control" placeholder="Option 3" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" name="o4" class="form-control" placeholder="Option 4" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Correct Answer</label>
                <input type="text" name="ans" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Add Question
            </button>

        </form>
    </div>
</div>

</body>
</html>
