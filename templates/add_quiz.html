<!DOCTYPE html>
<html>
<head>
<title>Add Quiz</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#43cea2,#185a9d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:400px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#185a9d;
color:white;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="card">

<h2>Add Quiz Question</h2>

<form action="/add_quiz" method="POST">

<select name="unit">

{% for u in units %}
<option value="{{u.id}}">{{u.name}}</option>
{% endfor %}

</select>

<select name="level">

<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>

</select>

<input type="text" name="question" placeholder="Question">

<input type="text" name="o1" placeholder="Option 1">
<input type="text" name="o2" placeholder="Option 2">
<input type="text" name="o3" placeholder="Option 3">
<input type="text" name="o4" placeholder="Option 4">

<input type="text" name="answer" placeholder="Correct Answer">

<button type="submit">Add Quiz</button>

</form>

</div>

</body>
</html>
