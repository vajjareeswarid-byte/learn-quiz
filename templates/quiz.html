<!DOCTYPE html>
<html>
<head>

<title>Quiz</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6ff;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

.question{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

button{
background:#6a11cb;
border:none;
padding:12px 25px;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.timer{
font-size:20px;
font-weight:bold;
color:red;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Quiz</h2>

<div class="timer">
Time Left: <span id="time">60</span> seconds
</div>

<form method="POST" id="quizForm">

{% for q in qs %}

<div class="question">

<p><b>{{loop.index}}. {{q.question}}</b></p>

<label>
<input type="radio" name="{{q.id}}" value="{{q.o1}}">
{{q.o1}}
</label><br>

<label>
<input type="radio" name="{{q.id}}" value="{{q.o2}}">
{{q.o2}}
</label><br>

<label>
<input type="radio" name="{{q.id}}" value="{{q.o3}}">
{{q.o3}}
</label><br>

<label>
<input type="radio" name="{{q.id}}" value="{{q.o4}}">
{{q.o4}}
</label><br>

</div>

{% endfor %}

<center>
<button type="submit">Submit Quiz</button>
</center>

</form>

</div>

<script>

var time = 60;

var timer = setInterval(function(){

time--;

document.getElementById("time").innerHTML = time;

if(time <= 0){

clearInterval(timer);

alert("Time Over! Quiz Submitted.");

document.getElementById("quizForm").submit();

}

},1000);

</script>

</body>
</html>
