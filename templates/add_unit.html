<!DOCTYPE html>
<html>
<head>
<title>Add Unit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
}

.card{
    background:white;
    padding:35px;
    border-radius:15px;
    width:380px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

select,input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#5a67d8;
}

.back{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#667eea;
}

</style>
</head>

<body>

<div class="card">

<h2>Add Unit</h2>

<form action="/add_unit" method="POST">

<select name="subject">

{% for s in subs %}
<option value="{{s.id}}">{{s.name}}</option>
{% endfor %}

</select>

<input type="text" name="unit" placeholder="Enter Unit Name" required>

<button type="submit">Add Unit</button>

</form>

<a href="/admin" class="back">← Back</a>

</div>

</body>
</html>
