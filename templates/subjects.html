<!DOCTYPE html>
<html>
<head>

<title>Subjects</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:linear-gradient(135deg,#6a11cb,#8e44ad);
min-height:100vh;
}

.container{
padding:40px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

button{
background:#6a11cb;
border:none;
padding:10px 20px;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2 style="color:white">Available Subjects</h2>

<div class="grid">

{% for s in subs %}

<div class="card">

<h3>{{s.name}}</h3>

<a href="/units/{{s.id}}">
<button>Open Units</button>
</a>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
